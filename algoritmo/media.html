<meta charset="utf-8">

<script>
    // Aqui estou criando três variaveis
    let nota1, nota2, media;
    
    // Aqui estou realizando a entrada de duas notas --> entrada de dados
    nota1 = parseInt(prompt("Digite a primeira nota"));
    nota2 = parseInt(prompt("Digite a primeira nota"));

    // processamento de dados
    media = (nota1 + nota2) / 2;

    // sainda de dados
    alert("Sua média é: " + media);
    console.log("Sua média é: " + media);
    document.write("Sua média é: " + media);

</script>
